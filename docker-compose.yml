services:
  postgres:
    image: postgres:16-alpine
    container_name: boardgames-postgres
    environment:
      POSTGRES_DB: boardgames
      POSTGRES_USER: boardgames
      POSTGRES_PASSWORD: boardgames
    ports:
      - "5432:5432"
    volumes:
      - boardgames-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boardgames -d boardgames"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  boardgames-pg-data:
